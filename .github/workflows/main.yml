# CI/CD Pipeline — Monorepo (frontend + backend)
# Runs on every push & PR to main.
# Backend: type-check → unit tests → integration tests → audit
# Frontend: type-check → production build
# Docker: build & push both images (main branch only)
#
# Prerequisites: run `npm install` at repo root to generate package-lock.json

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend CI ─────────────────────────────────────────────────
  backend-ci:
    name: Backend — Lint → Test → Audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chat2cash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d chat2cash_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install all workspace deps from root (resolves cross-workspace links)
      - name: Install dependencies
        run: npm ci
        working-directory: .

      # ── Type-check ───────────────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── Unit tests (no containers needed) ────────────────────────
      - name: Run unit tests
        run: npm run test:unit

      # ── Integration tests (Postgres + Redis from services above) ─
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/chat2cash_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          ANTHROPIC_API_KEY: test-key-not-used
          NEON_AUTH_URL: https://placeholder.neon.tech
          NEON_JWKS_URL: https://placeholder.neon.tech/.well-known/jwks.json
          AZURE_STORAGE_ACCOUNT_NAME: testaccount
          AZURE_STORAGE_ACCOUNT_KEY: dGVzdGtleQ==
        run: |
          npx drizzle-kit push
          npm run test:integration

      # ── Dependency audit (fail on high-severity) ─────────────────
      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: .

  # ── Frontend CI ────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Type-check → Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      # ── Type-check ───────────────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── Production build (catches import errors, dead code) ──────
      - name: Build production bundle
        run: npm run build

  # ── Docker: Build & Push Both Images ───────────────────────────
  docker:
    name: Build & Push Docker Images
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend image ────────────────────────────────────────────
      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

      # ── Frontend image ───────────────────────────────────────────
      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
