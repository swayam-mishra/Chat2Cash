name: Manual Release & Changelog

on:
  workflow_dispatch: # This adds the "Run workflow" button in the GitHub UI!

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Get commit history and latest tag
        id: git-info
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s")
          else
            COMMITS=$(git log --pretty=format:"- %s" $LATEST_TAG..HEAD)
          fi
          
          if [ -z "$COMMITS" ]; then
            echo "No new commits since last release. Skipping."
            exit 0
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "COMMITS<<$EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Generate Version & Changelog with Gemini
        id: gemini
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMITS: ${{ env.COMMITS }}
          LATEST_TAG: ${{ env.LATEST_TAG }}
        with:
          script: |
            const { GEMINI_API_KEY, COMMITS, LATEST_TAG } = process.env;
            
            if (!GEMINI_API_KEY) {
              throw new Error("❌ GEMINI_API_KEY is missing!");
            }

            const prompt = `
            You are a release manager. Analyze these commits and determine the semantic version bump.
            - "major": Breaking changes or major architectural rewrites.
            - "minor": New features added.
            - "patch": Bug fixes, performance improvements, chores, formatting.

            Also, generate a changelog using this exact structure:
            ### Added
            - [Feature description]

            ### Fixed
            - [Bug description]

            ### Changed
            - [Change description]

            ### Known Issues
            - [Only if mentioned in commits]

            Rules:
            1. Omit sections with no updates.
            2. Output ONLY a raw, valid JSON object. Do not use markdown code blocks (\`\`\`).
            
            JSON format required:
            {
              "bump": "patch",
              "changelog": "### Added\\n- Feature\\n### Fixed\\n- Bug"
            }

            Commits:
            ${COMMITS}
            `;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.1 } 
              })
            });

            if (!response.ok) throw new Error(`Gemini API Error: ${response.statusText}`);

            const data = await response.json();
            let rawText = data.candidates[0].content.parts[0].text;
            
            rawText = rawText.replace(/^```json\n?/m, '').replace(/```$/m, '').trim();
            const result = JSON.parse(rawText);
            
            let [major, minor, patch] = LATEST_TAG.replace('v', '').split('.').map(Number);
            
            if (LATEST_TAG === "v0.0.0") {
                minor = 1; patch = 0; major = 0;
            } else {
                if (result.bump === 'major') { major++; minor = 0; patch = 0; }
                else if (result.bump === 'minor') { minor++; patch = 0; }
                else { patch++; }
            }
            
            const nextTag = `v${major}.${minor}.${patch}`;
            const date = new Date().toISOString().split('T')[0];
            const fullChangelog = `## ${nextTag} — ${date}\n\n${result.changelog}\n\n---\n`;

            const fs = require('fs');
            fs.writeFileSync('NEW_CHANGELOG.md', fullChangelog);
            fs.writeFileSync('RELEASE_NOTES.md', result.changelog);
            fs.writeFileSync('NEXT_TAG.txt', nextTag);

      - name: Prepend to physical CHANGELOG.md
        run: |
          NEXT_TAG=$(cat NEXT_TAG.txt)
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV
          
          if [ -f CHANGELOG.md ]; then
            cat NEW_CHANGELOG.md CHANGELOG.md > temp && mv temp CHANGELOG.md
          else
            mv NEW_CHANGELOG.md CHANGELOG.md
          fi

      - name: Commit, Tag, and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          git commit -m "chore(release): bump version to ${{ env.NEXT_TAG }} [skip ci]"
          
          git tag ${{ env.NEXT_TAG }}
          git push origin main
          git push origin ${{ env.NEXT_TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXT_TAG }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: true
          make_latest: false